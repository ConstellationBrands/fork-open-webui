name: CBI Main - Build Docker Image

on:
  workflow_dispatch:  # Allow manual triggering
  push:
    branches:
      - cbi_main  # Only run on the cbi_main branch

env:
  REGISTRY: ghcr.io

jobs:
  build-docker-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
      # Debug information
      - name: Debug Information
        run: |
          echo "GitHub Context:"
          echo "  Repository: ${{ github.repository }}"
          echo "  Ref: ${{ github.ref }}"
          echo "  Event: ${{ github.event_name }}"
          echo "  Actor: ${{ github.actor }}"
      
      # Set repository and image name to lowercase
      - name: Set repository and image name to lowercase
        run: |
          echo "IMAGE_NAME=${IMAGE_NAME,,}" >>${GITHUB_ENV}
          echo "FULL_IMAGE_NAME=ghcr.io/${IMAGE_NAME,,}" >>${GITHUB_ENV}
        env:
          IMAGE_NAME: '${{ github.repository }}'

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker images
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.FULL_IMAGE_NAME }}
          tags: |
            type=raw,value=cbi-main
            type=sha,prefix=cbi-main-git-

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_HASH=${{ github.sha }}
          cache-from: type=registry,ref=${{ env.FULL_IMAGE_NAME }}:cache
          cache-to: type=registry,ref=${{ env.FULL_IMAGE_NAME }}:cache,mode=max
